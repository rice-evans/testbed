    <title>Rhys Evans — Profile</title>

    <!-- Critical, inline styles for the pre-mount loading screen below. Kept inline
         (not in App.css) so it paints immediately on slow connections, before the
         app bundle and stylesheet have finished downloading. -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fbfaf8;
        transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #initial-loader__mark {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 1.1rem;
        color: #0a66c2;
        background: #eaf3fd;
        box-shadow: 0 0 0 1px #ddd8d0;
        animation: initial-loader-pulse 1.1s ease-in-out infinite;
      }
      .initial-loader--done {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes initial-loader-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.92); opacity: 0.75; }
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-loader__mark { animation: none; }
      }
    </style>

    <!-- Open Graph -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Rhys Evans — Profile" />
    <meta property="og:description" content="Personal profile — experience, education, events and certificates." />
    <meta property="og:image" content="/Banner.webp" />
    <meta property="og:url" content="https://rhysprofile.com" />
    <meta property="og:site_name" content="Rhys Evans" />

    <!-- Twitter Card (falls back to Open Graph tags where omitted) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rhys Evans — Profile" />
    <meta name="twitter:description" content="Personal profile — experience, education, events and certificates." />
    <meta name="twitter:image" content="/Banner.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- The banner is the largest above-the-fold image (LCP candidate) — start fetching it
         immediately instead of waiting for React to mount and request it. -->
    <link rel="preload" as="image" href="/Banner.webp" fetchpriority="high" />
